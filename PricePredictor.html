<!DOCTYPE html>
<html>
  <head>
    <title>Player Fantasy Points Predictor</title>
    <script src="js/fantasyApp.js"></script>
    <link rel="stylesheet" type="text/css" href="css/fantasyPageStyles.css" />
  </head>
  <body>
    <h1>Player Information</h1>
    <form id="playerForm">
      <label style="margin-bottom: 0" for="playerName">Player Name:</label>
      <h5>First letter of First and Last name must be Capitalized</h5>
      <input type="text" id="playerName" name="playerName" required /><br />

      <label for="opponent">Opponent:</label>
      <select id="opponent" name="opponent" required>
        <option value="" disabled selected>Select an opponent</option>
        <option value="Phi">Eagles</option>
        <option value="SF">49ers</option>
        <option value="Dal">Cowboys</option>
        <option value="Bal">Ravens</option>
        <option value="Buf">Bills</option>
        <option value="Cle">Brows</option>
        <option value="NO">Saints</option>
        <option value="NYJ">Jets</option>
        <option value="Pit">Steelers</option>
        <option value="Mia">Dophins</option>
        <option value="KC">Chiefs</option>
        <option value="Atl">Atl</option>
        <option value="NE">Patriots</option>
        <option value="Sea">Seahawks</option>
        <option value="LV">Raiders</option>
        <option value="Det">Lions</option>
        <option value="NYG">Giants</option>
        <option value="Jax">Jaguars</option>
        <option value="Wsh">Commanders</option>
        <option value="GB">Packers</option>
        <option value="Min">Vikings</option>
        <option value="TB">Bucs</option>
        <option value="LAC">Chargers</option>
        <option value="Cin">Bengals</option>
        <option value="Ind">Colts</option>
        <option value="LAR">Rams</option>
        <option value="Hou">Texans</option>
        <option value="Car">Pathers</option>
        <option value="Ten">Titans</option>
        <option value="Den">Broncos</option>
        <option value="Chi">Bears</option>
        <option value="Ari">Cardinals</option>
        <!-- Add more teams and abbreviations as needed --></select
      ><br />
      <label for="week">Week:</label>
      <select id="week" name="week" required>
        <option value="" disabled selected>Select a week</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15">15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option></select
      ><br />

      <label for="atHome">At Home:</label>
      <select id="atHome" name="atHome">
        <option value="true">True</option>
        <option value="false">False</option>
      </select>

      <input style="margin-top: 2%" type="submit" value="Submit" />
    </form>

    <div id="result"></div>
  </body>
</html>
