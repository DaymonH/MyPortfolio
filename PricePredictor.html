<!DOCTYPE html>
<html>
  <head>
    <title>Player Fantasy Points Predictor</title>
    <script src="js/fantasyApp.js"></script>
    <link rel="stylesheet" type="text/css" href="css/fantasyPageStyles.css" />
  </head>
  <body>
    <h1>Player Information</h1>
    <form id="playerForm">
      <label for="playerName">Player Name:</label>
      <input type="text" id="playerName" name="playerName" required /><br />

      <label for="opponent">Opponent:</label>
      <select id="opponent" name="opponent" required>
        <option value="" disabled selected>Select an opponent</option>
        <option value="Phi">Phi</option>
        <option value="SF">SF</option>
        <option value="Dal">Dal</option>
        <option value="Bal">Bal</option>
        <option value="Buf">Buf</option>
        <option value="Cle">Cle</option>
        <option value="NO">NO</option>
        <option value="NYJ">NYJ</option>
        <option value="Pit">Pit</option>
        <option value="Mia">Mia</option>
        <option value="KC">KC</option>
        <option value="Alt">Alt</option>
        <option value="NE">NE</option>
        <option value="Sea">Sea</option>
        <option value="LV">LV</option>
        <option value="Det">Det</option>
        <option value="NYG">NYG</option>
        <option value="Jax">Jax</option>
        <option value="Wsh">Wsh</option>
        <option value="GB">GB</option>
        <option value="Min">Min</option>
        <option value="TB">TB</option>
        <option value="LAC">LAC</option>
        <option value="Cin">Cin</option>
        <option value="Ind">Ind</option>
        <option value="LAR">LAR</option>
        <option value="Hou">Hou</option>
        <option value="Car">Car</option>
        <option value="Ten">Ten</option>
        <option value="Den">Den</option>
        <option value="Chi">Chi</option>
        <option value="Ari">Ari</option>
        <!-- Add more teams and abbreviations as needed --></select
      ><br />
      <label for="week">Week:</label>
      <input type="number" id="week" name="week" required /><br />

      <label for="atHome">At Home:</label>
      <select id="atHome" name="atHome">
        <option value="true">True</option>
        <option value="false">False</option>
      </select>

      <input type="submit" value="Submit" />
    </form>

    <div id="result"></div>
  </body>
</html>
