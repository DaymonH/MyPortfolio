<!DOCTYPE html>
<html>
  <head>
    <title>Player Info</title>
    <script src="js/fantasyApp.js"></script>
    <link rel="stylesheet" type="text/css" href="css/fantasyPageStyles.css" />
  </head>
  <body>
    <h1>Player Information</h1>
    <form id="playerForm">
      <label for="playerName">Player Name:</label>
      <input type="text" id="playerName" name="playerName" required /><br />

      <label for="opponent">Opponent:</label>
      <input type="text" id="opponent" name="opponent" required /><br />

      <label for="week">Week:</label>
      <input type="number" id="week" name="week" required /><br />

      <label for="atHome">At Home:</label>
      <select id="atHome" name="atHome">
        <option value="true">True</option>
        <option value="false">False</option>
      </select>

      <input type="submit" value="Submit" />
    </form>

    <div id="result"></div>
  </body>
</html>
